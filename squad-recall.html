<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Last Drop: Recall</title>
    <meta
      name="description"
      content="A standalone Last Drop: Recall concept that turns a player's last Warzone result into a shareable recall card."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=Space+Mono:wght@400;700&family=Teko:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #030303;
        --ink: #f8f3ea;
        --muted: rgba(248, 243, 234, 0.66);
        --line: rgba(248, 243, 234, 0.16);
        --orange: #ff4b18;
        --orange-deep: #c92709;
        --sky: #8cc9ff;
        --paper: #f5f1e8;
        --paper-ink: #080808;
        --font-display: "Inter", "Arial Black", Arial, sans-serif;
        --font-tall: "Teko", "Arial Narrow", sans-serif;
        --font-mono: "Space Mono", "Roboto Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--bg);
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        color: var(--ink);
        background: var(--bg);
        font-family: var(--font-display);
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
      }

      button,
      a,
      select {
        font: inherit;
      }

      button,
      select {
        cursor: pointer;
      }

      .topbar {
        position: fixed;
        inset: 0 0 auto;
        z-index: 30;
        display: grid;
        grid-template-columns: minmax(7rem, 1fr) auto minmax(7rem, 1fr);
        align-items: center;
        gap: 1rem;
        height: 64px;
        padding: 0 1.4rem;
        border-bottom: 1px solid rgba(248, 243, 234, 0.18);
        background: rgba(0, 0, 0, 0.84);
        backdrop-filter: blur(18px);
      }

      .brand,
      .status {
        color: rgba(248, 243, 234, 0.58);
        font-family: var(--font-mono);
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .status {
        justify-self: end;
        color: var(--orange);
      }

      .tabs {
        display: flex;
        border: 1px solid rgba(248, 243, 234, 0.14);
        overflow-x: auto;
        scrollbar-width: none;
      }

      .tabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        display: inline-flex;
        align-items: center;
        min-height: 2.35rem;
        padding: 0 1rem;
        border-right: 1px solid rgba(248, 243, 234, 0.12);
        color: rgba(248, 243, 234, 0.64);
        font-family: var(--font-tall);
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-decoration: none;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .tab:last-child {
        border-right: 0;
      }

      .tab[aria-current="page"] {
        color: #0a0a0a;
        background: linear-gradient(180deg, #fff, #ded8cc);
      }

      main {
        position: relative;
        min-height: 100svh;
        overflow: hidden;
        background:
          radial-gradient(circle at 70% 30%, rgba(255, 75, 24, 0.2), transparent 24rem),
          linear-gradient(180deg, rgba(92, 174, 255, 0.72), rgba(40, 100, 153, 0.5) 34%, rgba(0, 0, 0, 0.96) 92%);
      }

      .sky {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.36), transparent 30%, rgba(0, 0, 0, 0.6) 78%),
          url("assets/squad-recall-alcatraz.svg") center 18% / cover no-repeat;
        filter: blur(9px) saturate(1.08);
        transform: scale(1.05);
      }

      .sky::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.5), transparent 13rem),
          linear-gradient(90deg, rgba(0, 0, 0, 0.44), rgba(0, 0, 0, 0.04) 42%, rgba(0, 0, 0, 0.58));
      }

      .speed-lines {
        position: absolute;
        inset: 0;
        opacity: 0.24;
        background:
          repeating-linear-gradient(104deg, transparent 0 42px, rgba(255, 255, 255, 0.34) 43px, transparent 45px),
          repeating-linear-gradient(83deg, transparent 0 72px, rgba(255, 255, 255, 0.16) 74px, transparent 76px);
        mix-blend-mode: screen;
        transform: skewY(-8deg);
      }

      .void {
        position: absolute;
        left: 50%;
        bottom: -30vh;
        width: 128vw;
        height: 62vh;
        border-radius: 50% 50% 0 0;
        background:
          radial-gradient(ellipse at center, rgba(0, 0, 0, 0.98), rgba(0, 0, 0, 0.9) 46%, transparent 74%);
        transform: translateX(-50%);
      }

      .hand {
        position: absolute;
        left: 49%;
        bottom: -4vh;
        z-index: 1;
        width: min(42vw, 550px);
        min-width: 260px;
        opacity: 0.9;
        transform: translateX(-50%) rotate(-3deg);
        filter: drop-shadow(0 36px 46px rgba(0, 0, 0, 0.72));
      }

      .plane-edge {
        position: absolute;
        inset: auto 0 0;
        z-index: 1;
        height: 30vh;
        background:
          linear-gradient(15deg, rgba(0, 0, 0, 0.95) 0 45%, transparent 46%),
          linear-gradient(-18deg, rgba(0, 0, 0, 0.88) 0 36%, transparent 37%);
        opacity: 0.82;
      }

      .page {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: minmax(280px, 0.5fr) minmax(620px, 0.78fr);
        gap: clamp(1rem, 2.8vw, 3.25rem);
        align-items: center;
        width: min(100%, 1640px);
        min-height: 100svh;
        margin: 0 auto;
        padding: 82px 4vw 24px;
      }

      .hero-copy {
        max-width: 500px;
      }

      .eyebrow {
        color: rgba(255, 255, 255, 0.78);
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.9rem 0 0;
        color: #fff;
        font-family: var(--font-display);
        font-size: clamp(3.35rem, 5.85vw, 6.25rem);
        font-weight: 900;
        letter-spacing: -0.06em;
        line-height: 0.86;
        text-transform: uppercase;
        text-shadow: 0 22px 64px rgba(0, 0, 0, 0.64);
      }

      h1 span {
        display: block;
        color: var(--orange);
        letter-spacing: -0.07em;
      }

      .subline {
        max-width: 470px;
        margin: 1.15rem 0 0;
        color: rgba(255, 255, 255, 0.76);
        font-size: clamp(1rem, 1.08vw, 1.13rem);
        font-weight: 700;
        line-height: 1.45;
      }

      .recall-stack {
        display: grid;
        grid-template-columns: minmax(0, 780px);
        gap: 0.72rem;
        align-items: start;
        width: min(100%, 780px);
        justify-self: end;
      }

      .recall-card {
        --accent: #ff4b18;
        --accent-2: #121212;
        --paper-tint: #f5f1e8;
        position: relative;
        aspect-ratio: 14 / 9;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 26px;
        color: var(--paper-ink);
        background:
          radial-gradient(circle at 100% 0, color-mix(in srgb, var(--accent) 24%, transparent), transparent 16rem),
          linear-gradient(145deg, #fff, var(--paper-tint) 62%, #ded8cc);
        box-shadow: 0 42px 90px rgba(0, 0, 0, 0.48);
        transition:
          background 220ms ease,
          box-shadow 220ms ease,
          transform 220ms ease;
      }

      .share-card-canvas {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: var(--paper-tint);
      }

      .recall-card:hover {
        transform: translateY(-2px);
        box-shadow:
          0 50px 110px rgba(0, 0, 0, 0.52),
          0 0 55px color-mix(in srgb, var(--accent) 28%, transparent);
      }

      .ascii-art {
        position: absolute;
        inset: 0;
        margin: 0;
        padding: 1.1rem;
        color: var(--accent);
        font-family: var(--font-mono);
        font-size: clamp(0.48rem, 1.09vw, 0.69rem);
        font-weight: 700;
        line-height: 0.92;
        letter-spacing: -0.04em;
        opacity: 0.2;
        white-space: pre;
        transform: rotate(-7deg) scale(1.15);
        transform-origin: 50% 44%;
        mix-blend-mode: multiply;
        user-select: none;
        pointer-events: none;
      }

      .card-veil {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.62) 42%, rgba(255, 255, 255, 0.82)),
          radial-gradient(circle at 76% 36%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 12rem);
        pointer-events: none;
      }

      .card-content {
        position: relative;
        z-index: 1;
        display: flex;
        min-height: 100%;
        flex-direction: column;
        padding: clamp(1.2rem, 1.55vw, 1.6rem);
      }

      .card-meta,
      .card-footer {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        color: rgba(0, 0, 0, 0.52);
        font-family: var(--font-mono);
        font-size: 0.56rem;
        font-weight: 700;
        line-height: 1.35;
        text-transform: uppercase;
      }

      .card-title {
        margin-top: clamp(2.1rem, 5vh, 4.2rem);
      }

      .alert-label {
        color: var(--accent);
        font-family: var(--font-mono);
        font-size: 0.66rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .card-title h2 {
        max-width: 100%;
        margin: 0.14rem 0 0;
        color: #0a0a0a;
        font-family: var(--font-display);
        font-size: clamp(3.45rem, 4.8vw, 5.1rem);
        font-weight: 900;
        letter-spacing: -0.075em;
        line-height: 0.82;
        text-transform: uppercase;
      }

      .card-title h2 span {
        display: block;
        color: var(--accent);
      }

      .stat-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.5rem;
        margin-top: 0.85rem;
      }

      .stat-pill {
        min-height: 3.95rem;
        padding: 0.62rem;
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: rgba(255, 255, 255, 0.56);
      }

      .stat-pill span {
        display: block;
        color: rgba(0, 0, 0, 0.54);
        font-family: var(--font-mono);
        font-size: 0.56rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .stat-pill strong {
        display: block;
        margin-top: 0.24rem;
        font-family: var(--font-tall);
        font-size: 2.05rem;
        font-weight: 700;
        line-height: 0.9;
      }

      .pnl-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        margin-top: 0.55rem;
        background: rgba(0, 0, 0, 0.12);
      }

      .pnl-grid div {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.48rem 0.56rem;
        background: rgba(255, 255, 255, 0.58);
        font-family: var(--font-mono);
        font-size: 0.56rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .pnl-grid strong {
        color: var(--accent);
      }

      .text-card {
        margin-top: 0.85rem;
        padding: 0.9rem;
        color: #fff;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.09), transparent 42%),
          #0a0a0a;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .text-card pre {
        margin: 0;
        color: rgba(255, 255, 255, 0.88);
        font-family: var(--font-mono);
        font-size: clamp(0.68rem, 0.92vw, 0.82rem);
        font-weight: 700;
        line-height: 1.38;
        white-space: pre-wrap;
      }

      .runback {
        margin: 0.82rem 0 0;
        color: #0a0a0a;
        font-family: var(--font-display);
        font-size: clamp(1.8rem, 2.4vw, 2.35rem);
        font-weight: 900;
        letter-spacing: -0.07em;
        line-height: 0.88;
        text-transform: uppercase;
      }

      .barcode {
        display: flex;
        align-items: end;
        justify-content: center;
        height: 40px;
        gap: 3px;
        margin-top: auto;
        padding-top: 1.25rem;
      }

      .barcode span {
        width: var(--w);
        height: var(--h);
        background: #0a0a0a;
      }

      .card-footer {
        margin-top: 0.9rem;
      }

      .style-dock {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 0.5rem;
        grid-column: 1;
        grid-row: 3;
      }

      .style-dock button,
      .style-dock select,
      .primary,
      .secondary {
        min-height: 3rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        color: var(--ink);
        background: rgba(0, 0, 0, 0.72);
        font-family: var(--font-tall);
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .style-dock button {
        width: 3.15rem;
      }

      .style-dock select {
        width: 100%;
        padding: 0 0.9rem;
        appearance: none;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.58rem;
        grid-column: 1;
        grid-row: 2;
        align-items: stretch;
        padding: 0.62rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.66);
        backdrop-filter: blur(16px);
      }

      .sms-preview {
        display: none;
        max-height: 9rem;
        margin: 0;
        overflow: hidden;
        padding: 0.85rem;
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 14px;
        color: rgba(255, 255, 255, 0.84);
        background: rgba(255, 255, 255, 0.055);
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 700;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .action-kicker {
        display: none;
        color: var(--orange);
        font-family: var(--font-mono);
        font-size: 0.64rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .actions h2 {
        display: none;
        margin: -0.25rem 0 0;
        color: #fff;
        font-family: var(--font-display);
        font-size: clamp(2.1rem, 3vw, 3.2rem);
        font-weight: 900;
        letter-spacing: -0.07em;
        line-height: 0.88;
        text-transform: uppercase;
      }

      .actions > p {
        display: none;
        margin: -0.25rem 0 0;
        color: rgba(248, 243, 234, 0.7);
        font-size: 0.92rem;
        font-weight: 700;
        line-height: 1.4;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.58rem;
      }

      .primary,
      .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3.05rem;
        padding: 0 0.9rem;
        text-decoration: none;
      }

      .primary {
        color: #fff;
        border-color: color-mix(in srgb, var(--orange) 70%, transparent);
        background: linear-gradient(180deg, var(--orange), var(--orange-deep));
        box-shadow: 0 16px 32px rgba(255, 75, 24, 0.24);
      }

      .primary.is-image {
        min-height: 3.05rem;
        font-size: 1.12rem;
      }

      .secondary {
        color: rgba(255, 255, 255, 0.82);
      }

      .qr-row {
        display: none;
        grid-template-columns: 78px minmax(0, 1fr);
        gap: 0.9rem;
        align-items: center;
      }

      .qr-row img {
        width: 78px;
        height: 78px;
        border: 7px solid #fff;
        border-radius: 13px;
        background: #fff;
      }

      .qr-row p,
      .status-copy {
        margin: 0;
        color: rgba(248, 243, 234, 0.58);
        font-family: var(--font-mono);
        font-size: 0.64rem;
        font-weight: 700;
        line-height: 1.45;
        text-transform: uppercase;
      }

      .status-copy {
        display: none;
      }

      @media (max-width: 980px) {
        .topbar {
          grid-template-columns: 1fr auto;
          padding-inline: 0.85rem;
        }

        .brand {
          display: none;
        }

        .status {
          font-size: 0.56rem;
        }

        .tabs {
          max-width: calc(100vw - 6rem);
        }

        .tab {
          padding: 0 0.78rem;
          font-size: 0.9rem;
        }

        .page {
          grid-template-columns: 1fr;
          align-items: start;
          padding: 88px 0.85rem 2rem;
        }

        .hero-copy {
          max-width: 100%;
          padding-top: 1.3rem;
        }

        .recall-stack {
          grid-template-columns: minmax(0, 760px);
          width: min(100%, 760px);
          justify-self: start;
        }

        .recall-card,
        .style-dock,
        .actions {
          grid-column: 1;
        }

        .hand {
          top: 218px;
          right: -158px;
          bottom: auto;
          left: auto;
          width: 400px;
          opacity: 0.3;
          transform: rotate(-10deg);
        }
      }

      @media (max-width: 620px) {
        h1 {
          font-size: clamp(3.4rem, 16vw, 5.25rem);
        }

        .subline {
          max-width: 23rem;
          font-size: 0.98rem;
        }

        .card-title {
          margin-top: 2.55rem;
        }

        .card-title h2 {
          font-size: clamp(3.65rem, 17vw, 4.5rem);
        }

        .stat-strip,
        .button-row {
          grid-template-columns: 1fr;
        }

        .actions {
          grid-template-columns: 1fr;
        }

        .style-dock {
          grid-template-columns: 3rem minmax(0, 1fr) 3rem;
        }

        .qr-row {
          grid-template-columns: 82px minmax(0, 1fr);
        }

        .qr-row img {
          width: 82px;
          height: 82px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar" aria-label="Experience Lab navigation">
      <div class="brand">Experience Lab</div>
      <nav class="tabs" aria-label="Concept tabs">
        <a class="tab" href="index.html">Touch Grass Exchange</a>
        <a class="tab" href="squad-recall.html" aria-current="page">Last Drop: Recall</a>
      </nav>
      <div class="status">Prototype 02 / 02</div>
    </header>

    <main>
      <div class="sky" aria-hidden="true"></div>
      <div class="speed-lines" aria-hidden="true"></div>
      <div class="void" aria-hidden="true"></div>
      <img class="hand" src="assets/squad-recall-hand.svg" alt="" aria-hidden="true" />
      <div class="plane-edge" aria-hidden="true"></div>

      <div class="page">
        <section class="hero-copy" aria-labelledby="page-title">
          <div class="eyebrow">Warzone reactivation concept</div>
          <h1 id="page-title">Last Drop<span>Recall</span></h1>
          <p class="subline">
            Generate the flex card. Copy the image. Text the squad.
          </p>
        </section>

        <aside class="recall-stack" aria-label="Recall card composer">
          <article class="recall-card" id="recallCard">
            <canvas
              class="share-card-canvas"
              id="shareCardCanvas"
              width="1400"
              height="900"
              aria-label="Generated Last Drop Recall share card"
            ></canvas>
          </article>

          <div class="style-dock" aria-label="ASCII card background controls">
            <button type="button" id="previousStyle" aria-label="Previous ASCII style">‹</button>
            <select id="styleSelect" aria-label="ASCII card background style"></select>
            <button type="button" id="nextStyle" aria-label="Next ASCII style">›</button>
          </div>

          <div class="actions">
            <button class="primary is-image" type="button" id="copyImageButton">Copy Card</button>
            <a class="secondary" id="smsLink" href="#">Invite Squad</a>
          </div>
        </aside>
      </div>
    </main>

    <script>
      const match = {
        player: "JACKGRINDS#7341",
        map: "Alcatraz / Resurgence",
        finish: "#1",
        kills: 21,
        redeploys: 2,
        revives: 3,
        damage: "7.9K",
        moment: "Final Circle Squad Wipe",
      };

      const recallText = `LAST DROP: RECALL
${match.kills} kills. ${match.finish} finish. ${match.moment}.

Need one more. Run it back:`;

      const asciiStyles = [
        {
          name: "01 Two-Piece",
          label: "Two-Piece ASCII",
          accent: "#ff4b18",
          paper: "#f5f1e8",
          art: [
            "     .-^^-.    .-^^-.",
            "    /  x  \\  /  x  \\",
            "   |   __  ||  __   |",
            "   |  /_/  ||  \\_\\  |",
            "    \\_____/  \\_____/",
            "       TWO-PIECE",
            "     QUICK CLEAN SPLIT",
          ],
        },
        {
          name: "02 Triple Tap",
          label: "Triple Tap ASCII",
          accent: "#111111",
          paper: "#f6f2ea",
          art: [
            "      .-.   .-.   .-.",
            "     (x_x) (x_x) (x_x)",
            "      /|\\   /|\\   /|\\",
            "      / \\   / \\   / \\",
            "    .-----------------.",
            "       THREE IN FEED",
            "    '-----------------'",
          ],
        },
        {
          name: "03 Four Down",
          label: "Four Down ASCII",
          accent: "#ef233c",
          paper: "#f8eee8",
          art: [
            "       [x]       [x]",
            "          \\     /",
            "           \\   /",
            "            \\ /",
            "            / \\",
            "          /     \\",

        {

        {

          label: "Medic ASCII",
          accent: "#2f80ed",
          paper: "#edf3fb",
          art: [
            "        __      __",

            "   /     ++++++      \\",

          ],

        {

            "         \\  []  /",

      const shareUrl = "https://jack-more.github.io/experience-lab/squad-recall.html";
      const smsBody = `${recallText}\n${shareUrl}`;
      const smsHref = `sms:&body=${encodeURIComponent(smsBody)}`;
      const recallCard = document.getElementById("recallCard");
      const shareCardCanvas = document.getElementById("shareCardCanvas");
      const shareCardContext = shareCardCanvas.getContext("2d");
      const styleSelect = document.getElementById("styleSelect");
      const previousStyle = document.getElementById("previousStyle");
      const nextStyle = document.getElementById("nextStyle");
      const smsLink = document.getElementById("smsLink");
      const copyImageButton = document.getElementById("copyImageButton");

      const cardMeta = [
        { metric: "kills", minValue: 2, tierName: "Two-Piece", requirement: "2+ kills" },
        { metric: "kills", minValue: 3, tierName: "Triple Tap", requirement: "3+ kills" },
        { metric: "kills", minValue: 4, tierName: "Four Down", requirement: "4+ kills" },
        { metric: "kills", minValue: 5, tierName: "Five Alive", requirement: "5+ kills" },
        { metric: "kills", minValue: 8, tierName: "Eight Ball", requirement: "8+ kills" },
        { metric: "kills", minValue: 10, tierName: "Double Digits", requirement: "10+ kills" },
        { metric: "kills", minValue: 12, tierName: "Dozen Run", requirement: "12+ kills" },
        { metric: "kills", minValue: 15, tierName: "High Kill Bloom", requirement: "15+ kills" },
        { metric: "kills", minValue: 18, tierName: "Almost Bomb", requirement: "18+ kills" },
        { metric: "kills", minValue: 20, tierName: "Twenty Bomb", requirement: "20+ kills" },
        { metric: "redeploys", minValue: 1, tierName: "Buyback Run", requirement: "1+ redeploy" },
        { metric: "redeploys", minValue: 2, tierName: "Redeploy Chain", requirement: "2+ redeploys" },
        { metric: "revives", minValue: 1, tierName: "Revive Save", requirement: "1+ revive" },
        { metric: "revives", minValue: 3, tierName: "Squad Medic", requirement: "3+ revives" },
        { metric: "redeploys", minValue: 3, tierName: "Clutch Buyback", requirement: "3+ redeploys" },
      ];

      asciiStyles.forEach((style, index) => {
        Object.assign(style, cardMeta[index]);
      });

      function isStyleUnlocked(style) {
        return match[style.metric] >= style.minValue;
      }

      const requestedStyle = new URLSearchParams(window.location.search).get("style");
      let activeStyle = asciiStyles.reduce((bestIndex, style, index) => {
        if (
          style.metric === "kills" &&
          isStyleUnlocked(style) &&
          style.minValue >= asciiStyles[bestIndex].minValue
        ) {
          return index;
        }

        return bestIndex;
      }, 5);

      if (requestedStyle !== null) {
        const requestedIndex = Number(requestedStyle);
        if (Number.isInteger(requestedIndex) && requestedIndex >= 0 && requestedIndex < asciiStyles.length) {
          activeStyle = requestedIndex;
        }
      }

      asciiStyles.forEach((style, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        const lockState = isStyleUnlocked(style) ? "unlocked" : "locked";
        option.textContent = `${style.requirement} · ${style.tierName} · ${lockState}`;
        styleSelect.append(option);
      });

      function roundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function fillRoundedRect(ctx, x, y, width, height, radius, fillStyle) {
        roundedRect(ctx, x, y, width, height, radius);
        ctx.fillStyle = fillStyle;
        ctx.fill();
      }

      function strokeRoundedRect(ctx, x, y, width, height, radius, strokeStyle, lineWidth = 2) {
        roundedRect(ctx, x, y, width, height, radius);
        ctx.strokeStyle = strokeStyle;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }

      function drawLines(ctx, lines, x, y, lineHeight) {
        lines.forEach((line, index) => {
          ctx.fillText(line, x, y + index * lineHeight);
        });
      }

      function drawStatBox(ctx, x, y, width, label, value, accent = "#0a0a0a") {
        fillRoundedRect(ctx, x, y, width, 120, 0, "rgba(255, 255, 255, 0.58)");
        ctx.strokeStyle = "rgba(0, 0, 0, 0.15)";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, width, 120);
        ctx.fillStyle = "rgba(0, 0, 0, 0.54)";
        ctx.font = "700 22px 'Space Mono', monospace";
        ctx.fillText(label.toUpperCase(), x + 24, y + 38);
        ctx.fillStyle = accent;
        ctx.font = "900 58px 'Teko', sans-serif";
        ctx.fillText(String(value).toUpperCase(), x + 24, y + 96);
      }

      function drawMiniQr(ctx, x, y, size, fg = "#ffffff") {
        const cells = 13;
        const cell = size / cells;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(x, y, size, size);
        ctx.fillStyle = "#080808";

        function finder(cx, cy) {
          ctx.fillRect(x + cx * cell, y + cy * cell, cell * 4, cell * 4);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(x + (cx + 1) * cell, y + (cy + 1) * cell, cell * 2, cell * 2);
          ctx.fillStyle = "#080808";
          ctx.fillRect(x + (cx + 1.7) * cell, y + (cy + 1.7) * cell, cell * 0.6, cell * 0.6);
        }

        finder(0, 0);
        finder(9, 0);
        finder(0, 9);

        for (let row = 0; row < cells; row += 1) {
          for (let col = 0; col < cells; col += 1) {
            const inFinder =
              (col < 4 && row < 4) ||
              (col > 8 && row < 4) ||
              (col < 4 && row > 8);

            if (!inFinder && (row * 7 + col * 5 + match.kills) % 4 === 0) {
              ctx.fillStyle = fg;
              ctx.fillRect(x + col * cell, y + row * cell, cell * 0.86, cell * 0.86);
            }
          }
        }
      }

      function getPrimaryStat(style) {
        if (style.metric === "redeploys") {
          return { value: `+${match.redeploys}`, label: "REDEPLOYS" };
        }

        if (style.metric === "revives") {
          return { value: `+${match.revives}`, label: "REVIVES" };
        }

        return { value: `+${match.kills}`, label: "KILLS" };
      }

      function renderShareCard() {
        const style = asciiStyles[activeStyle];
        const ctx = shareCardContext;
        const width = shareCardCanvas.width;
        const height = shareCardCanvas.height;
        const unlocked = isStyleUnlocked(style);
        const primary = getPrimaryStat(style);
        const isPrestigeKill = style.metric === "kills" && style.minValue >= 20;
        const artBg = isPrestigeKill ? style.accent : "#0d22f5";
        const artInk = isPrestigeKill ? "#120603" : "#f7f1e7";

        ctx.clearRect(0, 0, width, height);

        const baseGradient = ctx.createLinearGradient(0, 0, width, height);
        baseGradient.addColorStop(0, "#050606");
        baseGradient.addColorStop(0.6, "#070909");
        baseGradient.addColorStop(1, "#111718");
        ctx.fillStyle = baseGradient;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = artBg;
        ctx.fillRect(768, 0, width - 768, height);

        ctx.save();
        ctx.beginPath();
        ctx.rect(768, 0, width - 768, height);
        ctx.clip();

        if (style.textureBlocks !== false) {
          ctx.globalAlpha = 0.1;
          ctx.fillStyle = "#000";
          for (let y = -80; y < height + 120; y += 92) {
            ctx.fillRect(832, y, 148, 58);
            ctx.fillRect(1060, y + 36, 110, 58);
            ctx.fillRect(1260, y - 18, 86, 58);
          }
        }

        ctx.globalAlpha = unlocked ? 0.94 : 0.44;
        ctx.fillStyle = artInk;
        ctx.font = `700 ${style.featureFontSize || 34}px 'Space Mono', monospace`;
        const centerpiece = style.featureArt || style.art;
        drawLines(ctx, centerpiece, style.featureX || 826, style.featureY || 140, style.featureLineHeight || 43);

        ctx.globalAlpha = 0.08;
        ctx.font = "700 18px 'Space Mono', monospace";
        for (let y = 24; y < height; y += 58) {
          drawLines(ctx, style.art.slice(0, 3), 810, y, 22);
        }

        ctx.globalAlpha = 1;
        ctx.strokeStyle = artInk;
        ctx.lineWidth = 5;
        ctx.setLineDash([]);
        if (style.featureFrame !== false) {
          strokeRoundedRect(ctx, 818, 112, 500, 540, 26, artInk, 5);
        }
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.24)";
        ctx.lineWidth = 2;
        for (let x = 0; x < 760; x += 56) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + 210, height);
          ctx.stroke();
        }
        ctx.restore();

        ctx.fillStyle = "#f7f1e7";
        ctx.font = "900 42px Inter, Arial, sans-serif";
        ctx.fillText("LAST DROP: RECALL", 54, 70);
        ctx.font = "900 38px 'Space Mono', monospace";
        ctx.fillText(match.player.toUpperCase(), 56, 124);
        ctx.font = "700 18px 'Space Mono', monospace";
        ctx.fillStyle = "rgba(247, 241, 231, 0.62)";
        ctx.fillText("WARZONE // ALCATRAZ", 58, 158);

        fillRoundedRect(ctx, 58, 188, 290, 42, 21, unlocked ? style.accent : "#4b4b4b");
        ctx.fillStyle = "#fff";
        ctx.font = "700 20px 'Space Mono', monospace";
        ctx.fillText(style.requirement.toUpperCase(), 82, 216);

        ctx.fillStyle = style.accent;
        ctx.font = "900 190px Inter, Arial, sans-serif";
        ctx.fillText(primary.value, 54, 424);
        ctx.fillStyle = "#f7f1e7";
        ctx.font = "900 94px Inter, Arial, sans-serif";
        ctx.fillText(primary.label, 64, 520);

        ctx.fillStyle = "rgba(247, 241, 231, 0.58)";
        ctx.font = "700 21px 'Space Mono', monospace";
        ctx.fillStyle = style.accent;
        ctx.fillText(style.tierName.toUpperCase(), 62, 566);

        const stats = [
          ["FINISH", match.finish],
          ["DAMAGE", match.damage],
          ["REDEPLOYS", match.redeploys],
          ["REVIVES", match.revives],
        ];

        stats.forEach(([label, value], index) => {
          const x = 58 + (index % 2) * 318;
          const y = 622 + Math.floor(index / 2) * 104;
          fillRoundedRect(ctx, x, y, 276, 78, 12, "rgba(255, 255, 255, 0.075)");
          ctx.fillStyle = "rgba(247, 241, 231, 0.54)";
          ctx.font = "700 17px 'Space Mono', monospace";
          ctx.fillText(label, x + 20, y + 30);
          ctx.fillStyle = label === "DAMAGE" ? style.accent : "#f7f1e7";
          ctx.font = "900 36px 'Teko', sans-serif";
          ctx.fillText(String(value).toUpperCase(), x + 20, y + 64);
        });

        ctx.fillStyle = "rgba(247, 241, 231, 0.62)";
        ctx.font = "700 20px 'Space Mono', monospace";
        ctx.fillText(match.moment.toUpperCase(), 58, 850);

        drawMiniQr(ctx, 676, 754, 104, "#080808");
        ctx.fillStyle = "rgba(247, 241, 231, 0.48)";
        ctx.font = "700 14px 'Space Mono', monospace";
        ctx.fillText("SCAN", 684, 880);

        if (!unlocked) {
          ctx.save();
          ctx.fillStyle = "rgba(0, 0, 0, 0.56)";
          ctx.fillRect(0, 0, width, height);
          ctx.translate(width / 2, height / 2);
          ctx.rotate(-0.13);
          ctx.strokeStyle = style.accent;
          ctx.lineWidth = 8;
          strokeRoundedRect(ctx, -310, -90, 620, 180, 28, style.accent, 8);
          ctx.fillStyle = "#fff";
          ctx.textAlign = "center";
          ctx.font = "900 78px Inter, Arial, sans-serif";
          ctx.fillText(style.requirement.toUpperCase(), 0, -10);
          ctx.font = "700 28px 'Space Mono', monospace";
          ctx.fillText("LOCKED PREVIEW", 0, 46);
          ctx.restore();
        }
      }

      function setStyle(index) {
        activeStyle = (index + asciiStyles.length) % asciiStyles.length;
        const style = asciiStyles[activeStyle];
        styleSelect.value = String(activeStyle);
        recallCard.style.setProperty("--accent", style.accent);
        recallCard.style.setProperty("--paper-tint", style.paper);
        renderShareCard();
      }

      smsLink.href = smsHref;
      setStyle(activeStyle);
      if (document.fonts) {
        document.fonts.ready.then(renderShareCard);
      }

      previousStyle.addEventListener("click", () => setStyle(activeStyle - 1));
      nextStyle.addEventListener("click", () => setStyle(activeStyle + 1));
      styleSelect.addEventListener("change", (event) => setStyle(Number(event.target.value)));

      function canvasToBlob(canvas) {
        return new Promise((resolve, reject) => {
          canvas.toBlob((blob) => {
            if (blob) {
              resolve(blob);
            } else {
              reject(new Error("Unable to render card image"));
            }
          }, "image/png", 0.96);
        });
      }

      async function copyCardImage() {
        const blob = await canvasToBlob(shareCardCanvas);

        if (navigator.clipboard && window.ClipboardItem && window.isSecureContext) {
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          return;
        }

        const downloadUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = downloadUrl;
        link.download = `last-drop-recall-${match.kills}-kills.png`;
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(downloadUrl);
      }

      copyImageButton.addEventListener("click", async () => {
        try {
          await copyCardImage();
        } catch {}
      });
    </script>
