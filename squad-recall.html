        --bg: #030303;
        --ink: #f8f3ea;
        --muted: rgba(248, 243, 234, 0.66);
        --line: rgba(248, 243, 234, 0.16);
        --orange: #ff4b18;
        --orange-deep: #c92709;
        --sky: #8cc9ff;
        --paper: #f5f1e8;
        --paper-ink: #080808;
        --font-display: "Inter", "Arial Black", Arial, sans-serif;
        --font-tall: "Teko", "Arial Narrow", sans-serif;
        --font-mono: "Space Mono", "Roboto Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--bg);
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        color: var(--ink);
        background: var(--bg);
        font-family: var(--font-display);
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
      }

      button,
      a,
      select {
        font: inherit;
      }

      button,
      select {
        cursor: pointer;
      }

      .topbar {
        position: fixed;
        inset: 0 0 auto;
        z-index: 30;
        display: grid;
        grid-template-columns: minmax(7rem, 1fr) auto minmax(7rem, 1fr);
        align-items: center;
        gap: 1rem;
        height: 64px;
        padding: 0 1.4rem;
        border-bottom: 1px solid rgba(248, 243, 234, 0.18);
        background: rgba(0, 0, 0, 0.84);
        backdrop-filter: blur(18px);
      }

      .brand,
      .status {
        color: rgba(248, 243, 234, 0.58);
        font-family: var(--font-mono);
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .status {
        justify-self: end;
        color: var(--orange);
      }

      .tabs {
        display: flex;
        border: 1px solid rgba(248, 243, 234, 0.14);
        overflow-x: auto;
        scrollbar-width: none;
      }

      .tabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        display: inline-flex;
        align-items: center;
        min-height: 2.35rem;
        padding: 0 1rem;
        border-right: 1px solid rgba(248, 243, 234, 0.12);
        color: rgba(248, 243, 234, 0.64);
        font-family: var(--font-tall);
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-decoration: none;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .tab:last-child {
        border-right: 0;
      }

      .tab[aria-current="page"] {
        color: #0a0a0a;
        background: linear-gradient(180deg, #fff, #ded8cc);
      }

      main {
        position: relative;
        min-height: 100svh;
        overflow: hidden;
        background:
          radial-gradient(circle at 70% 30%, rgba(255, 75, 24, 0.2), transparent 24rem),
          linear-gradient(180deg, rgba(92, 174, 255, 0.72), rgba(40, 100, 153, 0.5) 34%, rgba(0, 0, 0, 0.96) 92%);
      }

      .sky {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.36), transparent 30%, rgba(0, 0, 0, 0.6) 78%),
          url("assets/squad-recall-alcatraz.svg") center 18% / cover no-repeat;
        filter: blur(9px) saturate(1.08);
        transform: scale(1.05);
      }

      .sky::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.5), transparent 13rem),
          linear-gradient(90deg, rgba(0, 0, 0, 0.44), rgba(0, 0, 0, 0.04) 42%, rgba(0, 0, 0, 0.58));
      }

      .speed-lines {
        position: absolute;
        inset: 0;
        opacity: 0.24;
        background:
          repeating-linear-gradient(104deg, transparent 0 42px, rgba(255, 255, 255, 0.34) 43px, transparent 45px),
          repeating-linear-gradient(83deg, transparent 0 72px, rgba(255, 255, 255, 0.16) 74px, transparent 76px);
        mix-blend-mode: screen;
        transform: skewY(-8deg);
      }

      .void {
        position: absolute;
        left: 50%;
        bottom: -30vh;
        width: 128vw;
        height: 62vh;
        border-radius: 50% 50% 0 0;
        background:
          radial-gradient(ellipse at center, rgba(0, 0, 0, 0.98), rgba(0, 0, 0, 0.9) 46%, transparent 74%);
        transform: translateX(-50%);
      }

      .hand {
        position: absolute;
        left: 49%;
        bottom: -4vh;
        z-index: 1;
        width: min(42vw, 550px);
        min-width: 260px;
        opacity: 0.9;
        transform: translateX(-50%) rotate(-3deg);
        filter: drop-shadow(0 36px 46px rgba(0, 0, 0, 0.72));
      }

      .plane-edge {
        position: absolute;
        inset: auto 0 0;
        z-index: 1;
        height: 30vh;
        background:
          linear-gradient(15deg, rgba(0, 0, 0, 0.95) 0 45%, transparent 46%),
          linear-gradient(-18deg, rgba(0, 0, 0, 0.88) 0 36%, transparent 37%);
        opacity: 0.82;
      }

      .page {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: minmax(280px, 0.5fr) minmax(620px, 0.78fr);
        gap: clamp(1rem, 2.8vw, 3.25rem);
        align-items: center;
        width: min(100%, 1640px);
        min-height: 100svh;
        margin: 0 auto;
        padding: 82px 4vw 24px;
      }

      .hero-copy {
        max-width: 500px;
      }

      .eyebrow {
        color: rgba(255, 255, 255, 0.78);
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.9rem 0 0;
        color: #fff;
        font-family: var(--font-display);
        font-size: 6.05rem;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.86;
        text-transform: uppercase;
        text-shadow: 0 22px 64px rgba(0, 0, 0, 0.64);
      }

      h1 span {
        display: block;
        color: var(--orange);
        letter-spacing: 0;
      }

      .subline {
        max-width: 470px;
        margin: 1.15rem 0 0;
        color: rgba(255, 255, 255, 0.76);
        font-size: 1.08rem;
        font-weight: 700;
        line-height: 1.45;
      }

      .recall-stack {
        display: grid;
        grid-template-columns: minmax(0, 780px);
        gap: 0.72rem;
        align-items: start;
        width: min(100%, 780px);
        justify-self: end;
      }

      .recall-card {
        --accent: #ff4b18;
        --accent-2: #121212;
        --paper-tint: #f5f1e8;
        position: relative;
        aspect-ratio: 14 / 9;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 26px;
        color: var(--paper-ink);
        background:
          radial-gradient(circle at 100% 0, color-mix(in srgb, var(--accent) 24%, transparent), transparent 16rem),
          linear-gradient(145deg, #fff, var(--paper-tint) 62%, #ded8cc);
        box-shadow: 0 42px 90px rgba(0, 0, 0, 0.48);
        transition:
          background 220ms ease,
          box-shadow 220ms ease,
          transform 220ms ease;
      }

      .share-card-canvas {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: var(--paper-tint);
      }

      .recall-card:hover {
        transform: translateY(-2px);
        box-shadow:
          0 50px 110px rgba(0, 0, 0, 0.52),
          0 0 55px color-mix(in srgb, var(--accent) 28%, transparent);
      }

      .style-dock {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 0.5rem;
        grid-column: 1;
      }

      .style-dock button,
      .style-dock select,
      .primary,
      .secondary {
        min-height: 3rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        color: var(--ink);
        background: rgba(0, 0, 0, 0.72);
        font-family: var(--font-tall);
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .style-dock button {
        width: 3.15rem;
      }

      .style-dock select {
        width: 100%;
        padding: 0 0.9rem;
        appearance: none;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.58rem;
        grid-column: 1;
        align-items: stretch;
        padding: 0.62rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.66);
        backdrop-filter: blur(16px);

      .primary,
      .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3.05rem;
        padding: 0 0.9rem;
        text-decoration: none;
      }

      .primary {
        color: #fff;
        border-color: color-mix(in srgb, var(--orange) 70%, transparent);
        background: linear-gradient(180deg, var(--orange), var(--orange-deep));

        color: rgba(255, 255, 255, 0.82);

        .tabs {

          padding-top: 1.3rem;

          justify-self: start;
        }

        .recall-card,

          right: -158px;

        h1 {

          font-size: 0.98rem;

        .actions {
          grid-template-columns: 1fr;
        }

        .style-dock {
          grid-template-columns: 3rem minmax(0, 1fr) 3rem;
        }

      @media (max-width: 440px) {
        h1 {
          font-size: 3.35rem;
        }
      }

      @media (max-width: 360px) {
        h1 {
          font-size: 2.95rem;
        }
      }
    </style>
  </head>

        K03: { finish: "#9", kills: 3, redeploys: 0, revives: 0, damage: "1.1K", moment: "Three kills, left with dignity" },
        K04: { finish: "#7", kills: 4, redeploys: 1, revives: 0, damage: "1.6K", moment: "Held the run together somehow" },
        K05: { finish: "#5", kills: 5, redeploys: 1, revives: 1, damage: "2.1K", moment: "Five alive, squad breathing" },
        K08: { finish: "#4", kills: 8, redeploys: 1, revives: 1, damage: "3.4K", moment: "Hot run marker" },
        K10: { finish: "#3", kills: 10, redeploys: 1, revives: 1, damage: "4.2K", moment: "Lobby noticed" },
        K12: { finish: "#2", kills: 12, redeploys: 1, revives: 2, damage: "5.1K", moment: "Damage on board" },
        K15: { finish: "#1", kills: 15, redeploys: 2, revives: 2, damage: "6.3K", moment: "Lobby in orbit" },
        K18: { finish: "#1", kills: 18, redeploys: 2, revives: 3, damage: "7.1K", moment: "One more fight from the bomb" },
        K20: { finish: "#1", kills: 21, redeploys: 2, revives: 3, damage: "7.9K", moment: "Final circle squad wipe" },
        R01: { finish: "#10", kills: 2, redeploys: 1, revives: 0, damage: "940", moment: "Bought one back and called it economy" },
        R02: { finish: "#6", kills: 5, redeploys: 2, revives: 1, damage: "2.4K", moment: "Cash got the squad moving" },
        R03: { finish: "#3", kills: 7, redeploys: 3, revives: 1, damage: "3.2K", moment: "Last cash, squad sent" },
        V01: { finish: "#8", kills: 3, redeploys: 0, revives: 1, damage: "1.4K", moment: "Saved the run once" },
        V03: { finish: "#2", kills: 6, redeploys: 1, revives: 3, damage: "3.5K", moment: "Everyone got a second life" },
      };

      function isStyleUnlocked(style) {
        return match[style.metric] >= style.minValue;
      }

      const requestedStyle = new URLSearchParams(window.location.search).get("style");
      let activeStyle = cardStyles.reduce((bestIndex, style, index) => {
        if (
          style.metric === "kills" &&
          isStyleUnlocked(style) &&
          style.minValue >= cardStyles[bestIndex].minValue
        ) {
          return index;
        }

        return bestIndex;
      }, 0);

      if (requestedStyle !== null) {
        const requestedIndex = Number(requestedStyle);
        if (Number.isInteger(requestedIndex) && requestedIndex >= 0 && requestedIndex < cardStyles.length) {
          activeStyle = requestedIndex;
        }
      }

      cardStyles.forEach((style, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        const lockState = isStyleUnlocked(style) ? "unlocked" : "locked";
        const plate = getStylePlate(style);
        option.textContent = `${style.requirement} · ${plate.label} · ${style.tierName} · ${lockState}`;
        styleSelect.append(option);
      });

      Object.values(artPlates).forEach((plate) => {
        const image = new Image();
        image.addEventListener("load", renderShareCard);
        image.src = plate.src;
        plate.image = image;
      });

      function roundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function fillRoundedRect(ctx, x, y, width, height, radius, fillStyle) {
        roundedRect(ctx, x, y, width, height, radius);
        ctx.fillStyle = fillStyle;
        ctx.fill();
      }

      function strokeRoundedRect(ctx, x, y, width, height, radius, strokeStyle, lineWidth = 2) {
        roundedRect(ctx, x, y, width, height, radius);
        ctx.strokeStyle = strokeStyle;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }

      function hexToRgb(hex) {
        const clean = hex.replace("#", "");
        const value = parseInt(clean.length === 3 ? clean.replace(/(.)/g, "$1$1") : clean, 16);
        return {
          r: (value >> 16) & 255,
          g: (value >> 8) & 255,
          b: value & 255,
        };
      }

      function alpha(hex, opacity) {
        const { r, g, b } = hexToRgb(hex);
        return `rgba(${r}, ${g}, ${b}, ${opacity})`;
      }

      function seededRandom(seed) {
        let value = seed >>> 0;
        return () => {
          value += 0x6d2b79f5;
          let t = value;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function drawFittedText(ctx, text, x, y, maxWidth, fontSize, minSize, fontFamily, weight = 900) {
        let size = fontSize;
        let fittedText = text;

        do {
          ctx.font = `${weight} ${size}px ${fontFamily}`;
          if (ctx.measureText(fittedText).width <= maxWidth || size <= minSize) {
            break;
          }

          size -= 2;
        } while (size > minSize);

        while (ctx.measureText(fittedText).width > maxWidth && fittedText.length > 4) {
          fittedText = `${fittedText.slice(0, -4)}...`;
        }

        ctx.fillText(fittedText, x, y);
        return size;
      }

      function drawGrain(ctx, width, height, seed, opacity) {
        const random = seededRandom(seed);
        ctx.save();
        ctx.globalAlpha = opacity;

        for (let index = 0; index < 1200; index += 1) {
          const x = random() * width;
          const y = random() * height;
          const shade = random() > 0.58 ? "#ffffff" : "#000000";
          ctx.fillStyle = shade;
          ctx.fillRect(x, y, random() * 2.4 + 0.4, random() * 2.4 + 0.4);
        }

        ctx.restore();
      }

      function drawBarcode(ctx, x, y, width, height, color) {
        const bars = [4, 2, 9, 3, 5, 2, 11, 2, 4, 7, 2, 6, 3, 8, 2, 5];
        let cursor = x;
        ctx.fillStyle = color;

        bars.forEach((bar, index) => {
          const barWidth = (bar / 82) * width;
          const barHeight = height * (index % 3 === 0 ? 1 : index % 2 === 0 ? 0.74 : 0.48);
          ctx.fillRect(cursor, y + height - barHeight, barWidth, barHeight);
          cursor += barWidth + width * 0.011;
        });
      }

      function drawMiniQr(ctx, x, y, size, fg = "#ffffff") {
        const cells = 13;
        const cell = size / cells;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(x, y, size, size);
        ctx.fillStyle = "#080808";

        function finder(cx, cy) {
          ctx.fillRect(x + cx * cell, y + cy * cell, cell * 4, cell * 4);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(x + (cx + 1) * cell, y + (cy + 1) * cell, cell * 2, cell * 2);
          ctx.fillStyle = "#080808";
          ctx.fillRect(x + (cx + 1.7) * cell, y + (cy + 1.7) * cell, cell * 0.6, cell * 0.6);
        }

        finder(0, 0);
        finder(9, 0);
        finder(0, 9);

        for (let row = 0; row < cells; row += 1) {
          for (let col = 0; col < cells; col += 1) {
            const inFinder =
              (col < 4 && row < 4) ||
              (col > 8 && row < 4) ||
              (col < 4 && row > 8);

            if (!inFinder && (row * 7 + col * 5 + match.kills) % 4 === 0) {
              ctx.fillStyle = fg;
              ctx.fillRect(x + col * cell, y + row * cell, cell * 0.86, cell * 0.86);
            }
          }
        }
      }

      function getStyleStats(style) {
        return {
          ...match,
          ...(styleStats[style.serial] || {}),
        };
      }

      function getActiveStyle() {
        return cardStyles[activeStyle];
      }

      function getMetricLabel(metric, value) {
        if (metric === "redeploys") {
          return value === 1 ? "redeploy" : "redeploys";
        }

        if (metric === "revives") {
          return value === 1 ? "revive" : "revives";
        }

        return "kills";
      }

      function getPrimaryStat(style, stats = getStyleStats(style)) {
        const value = stats[style.metric];
        return {
          value: `+${value}`,
          label: getMetricLabel(style.metric, value),
          rawValue: value,
        };
      }

      function getRecallText(style = getActiveStyle(), stats = getStyleStats(style)) {
        const primary = getPrimaryStat(style, stats);
        return `LAST DROP: RECALL
${primary.rawValue} ${primary.label}. ${stats.finish} finish. ${stats.moment}.

Need one more. Run it back:`;
      }

      function getSmsHref(style = getActiveStyle(), stats = getStyleStats(style)) {
        return `sms:&body=${encodeURIComponent(`${getRecallText(style, stats)}\n${shareUrl}`)}`;
      }

      function getCardFilename(style = getActiveStyle(), stats = getStyleStats(style)) {
        const primary = getPrimaryStat(style, stats);
        const metric = primary.label.replace(/\s+/g, "-");
        return `last-drop-recall-${primary.rawValue}-${metric}.png`;
      }

      function getStylePlate(style) {
        if (style.metric === "kills") {
          const key = `kill${String(style.minValue).padStart(2, "0")}`;
          return artPlates[key] || artPlates.kill20;
        }

        if (style.metric === "redeploys") {
          const key = `redeploy${String(style.minValue).padStart(2, "0")}`;
          return artPlates[key] || artPlates.redeploy;
        }

        if (style.metric === "revives") {
          const key = `revive${String(style.minValue).padStart(2, "0")}`;
          return artPlates[key] || artPlates.revive;
        }

        return artPlates[style.family] || artPlates.kill20;
      }

      function getStyleRarity(style) {
        if (style.metric === "redeploys") {
          if (style.minValue >= 3) {
            return { label: "Legendary Foil", reveal: 1, color: 1, shine: 1, marks: 10 };
          }

          if (style.minValue >= 2) {
            return { label: "Rare Gloss", reveal: 0.74, color: 0.82, shine: 0.52, marks: 6 };
          }

          return { label: "Common Print", reveal: 0.42, color: 0.36, shine: 0.1, marks: 3 };
        }

        if (style.metric === "revives") {
          if (style.minValue >= 3) {
            return { label: "Epic Foil", reveal: 0.88, color: 0.95, shine: 0.74, marks: 8 };
          }

          return { label: "Uncommon Print", reveal: 0.54, color: 0.52, shine: 0.22, marks: 4 };
        }

        if (style.minValue >= 20) {
          return { label: "Mythic Foil", reveal: 1, color: 1, shine: 1, marks: 12 };
        }

        if (style.minValue >= 18) {
          return { label: "Legendary", reveal: 0.92, color: 0.95, shine: 0.86, marks: 10 };
        }

        if (style.minValue >= 15) {
          return { label: "Epic Foil", reveal: 0.82, color: 0.86, shine: 0.68, marks: 8 };
        }

        if (style.minValue >= 12) {
          return { label: "Epic", reveal: 0.72, color: 0.78, shine: 0.52, marks: 7 };
        }

        if (style.minValue >= 10) {
          return { label: "Rare Gloss", reveal: 0.62, color: 0.64, shine: 0.36, marks: 6 };
        }

        if (style.minValue >= 8) {
          return { label: "Rare", reveal: 0.54, color: 0.54, shine: 0.26, marks: 5 };
        }

        if (style.minValue >= 5) {
          return { label: "Uncommon", reveal: 0.44, color: 0.42, shine: 0.16, marks: 4 };
        }

        if (style.minValue >= 4) {
          return { label: "Uncommon Proof", reveal: 0.36, color: 0.34, shine: 0.08, marks: 3 };
        }

        return { label: "Common Print", reveal: 0.26, color: 0.22, shine: 0, marks: 2 };
      }

      function drawCoverImage(ctx, image, x, y, width, height) {
        const sourceRatio = image.naturalWidth / image.naturalHeight;
        const targetRatio = width / height;
        let sourceWidth = image.naturalWidth;
        let sourceHeight = image.naturalHeight;
        let sourceX = 0;
        let sourceY = 0;

        if (sourceRatio > targetRatio) {
          sourceWidth = image.naturalHeight * targetRatio;
          sourceX = (image.naturalWidth - sourceWidth) / 2;
        } else {
          sourceHeight = image.naturalWidth / targetRatio;
          sourceY = (image.naturalHeight - sourceHeight) / 2;
        }

        ctx.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, x, y, width, height);
      }

      function drawGeneratedArt(ctx, style, x, y, width, height) {
        const plate = getStylePlate(style);
        const rarity = getStyleRarity(style);

        ctx.save();
        roundedRect(ctx, x, y, width, height, 30);
        ctx.clip();

        const fallback = ctx.createLinearGradient(x, y, x + width, y + height);
        fallback.addColorStop(0, style.deep);
        fallback.addColorStop(0.48, style.mid);
        fallback.addColorStop(1, "#050505");
        ctx.fillStyle = fallback;
        ctx.fillRect(x, y, width, height);

        if (plate.image && plate.image.complete && plate.image.naturalWidth > 0) {
          ctx.save();
          ctx.globalAlpha = 0.7 + rarity.reveal * 0.3;
          ctx.filter = [
            `grayscale(${Math.max(0, (1 - rarity.color) * 0.38)})`,
            `saturate(${0.9 + rarity.color * 0.9})`,
            `contrast(${0.98 + rarity.reveal * 0.14})`,
            `brightness(${0.98 + rarity.reveal * 0.1})`,
            `blur(${Math.max(0, (1 - rarity.reveal) * 0.35)}px)`,
          ].join(" ");
          drawCoverImage(ctx, plate.image, x, y, width, height);
          ctx.restore();
        }

        const edgeShade = ctx.createLinearGradient(x, y, x + width, y);
        edgeShade.addColorStop(0, "rgba(0, 0, 0, 0.5)");
        edgeShade.addColorStop(0.16, "rgba(0, 0, 0, 0.06)");
        edgeShade.addColorStop(0.72, "rgba(0, 0, 0, 0)");
        edgeShade.addColorStop(1, `rgba(0, 0, 0, ${0.56 - rarity.reveal * 0.18})`);
        ctx.fillStyle = edgeShade;
        ctx.fillRect(x, y, width, height);

        const bottomShade = ctx.createLinearGradient(x, y + height * 0.56, x, y + height);
        bottomShade.addColorStop(0, "rgba(0, 0, 0, 0)");
        bottomShade.addColorStop(1, "rgba(0, 0, 0, 0.64)");
        ctx.fillStyle = bottomShade;
        ctx.fillRect(x, y, width, height);

        if (rarity.reveal < 0.58) {
          ctx.save();
          ctx.globalAlpha = 0.16 - rarity.reveal * 0.08;
          ctx.fillStyle = "#000";
          ctx.fillRect(x, y, width, height);
          ctx.globalAlpha = 0.09;
          ctx.strokeStyle = "#fffaf0";
          ctx.lineWidth = 2;
          for (let stripe = -height; stripe < width; stripe += 46) {
            ctx.beginPath();
            ctx.moveTo(x + stripe, y + height);
            ctx.lineTo(x + stripe + height, y);
            ctx.stroke();
          }
          ctx.restore();
        }

        ctx.globalCompositeOperation = "screen";
        ctx.fillStyle = alpha(style.accent, 0.08 + rarity.reveal * 0.13);
        ctx.fillRect(x, y, width, height);
        ctx.globalCompositeOperation = "source-over";

        if (rarity.shine > 0.25) {
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          const foil = ctx.createLinearGradient(x + width * 0.22, y, x + width * 0.92, y + height);
          foil.addColorStop(0, "rgba(255, 255, 255, 0)");
          foil.addColorStop(0.46, alpha(style.accent2, 0.02 + rarity.shine * 0.18));
          foil.addColorStop(0.52, "rgba(255, 255, 255, 0.22)");
          foil.addColorStop(0.58, alpha(style.accent, 0.02 + rarity.shine * 0.14));
          foil.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = foil;
          ctx.fillRect(x, y, width, height);
          ctx.globalAlpha = rarity.shine * 0.38;
          ctx.strokeStyle = "#fffaf0";
          ctx.lineWidth = 3;
          for (let line = 0; line < rarity.marks; line += 1) {
            const offset = line * 58;
            ctx.beginPath();
            ctx.moveTo(x + width - 180 - offset, y + 20);
            ctx.lineTo(x + width + 50 - offset, y + height - 60);
            ctx.stroke();
          }
          ctx.restore();
        }

        ctx.fillStyle = "rgba(0, 0, 0, 0.54)";
        ctx.fillRect(x, y, width, 96);
        ctx.fillStyle = "#fffaf0";
        ctx.font = "900 30px 'Space Mono', monospace";
        ctx.fillText(plate.label.toUpperCase(), x + 36, y + 50);
        ctx.fillStyle = alpha(style.accent2, 0.9);
        ctx.font = "700 18px 'Space Mono', monospace";
        ctx.fillText(`${style.serial} // ${style.requirement.toUpperCase()} // ${rarity.label.toUpperCase()}`, x + 36, y + 79);

        for (let index = 0; index < 12; index += 1) {
          const filled = index < rarity.marks;
          const fill = filled ? alpha(style.accent2, 0.88) : "rgba(255, 255, 255, 0.14)";
          fillRoundedRect(ctx, x + 36 + index * 18, y + height - 50, 10, 20, 2, fill);
        }

        ctx.restore();
        strokeRoundedRect(ctx, x, y, width, height, 30, alpha(style.accent2, 0.2 + rarity.reveal * 0.44), 2 + rarity.shine * 2);
      }

      function drawKatana(ctx, cx, cy, angle, length, accent, highlight) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        fillRoundedRect(ctx, -length * 0.44, -7, length * 0.8, 14, 7, "rgba(244, 241, 224, 0.72)");
        fillRoundedRect(ctx, length * 0.24, -5, length * 0.22, 10, 5, highlight);
        fillRoundedRect(ctx, -length * 0.5, -11, length * 0.1, 22, 4, accent);
        ctx.fillStyle = "rgba(0, 0, 0, 0.56)";
        ctx.fillRect(-length * 0.58, -18, length * 0.1, 36);
        ctx.restore();
      }

      function drawSamuraiHelmet(ctx, cx, cy, scale, style) {
        const s = scale;
        const accent = style.accent;
        const gold = style.accent2;

        ctx.save();
        ctx.translate(cx, cy);

        const shadow = ctx.createRadialGradient(0, 40 * s, 20 * s, 0, 90 * s, 260 * s);
        shadow.addColorStop(0, "rgba(0, 0, 0, 0.1)");
        shadow.addColorStop(1, "rgba(0, 0, 0, 0.62)");
        ctx.fillStyle = shadow;
        ctx.beginPath();
        ctx.ellipse(0, 128 * s, 210 * s, 58 * s, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = alpha(gold, 0.88);
        ctx.beginPath();
        ctx.moveTo(-180 * s, -92 * s);
        ctx.quadraticCurveTo(-282 * s, -178 * s, -318 * s, -34 * s);
        ctx.quadraticCurveTo(-232 * s, -78 * s, -158 * s, -30 * s);
        ctx.lineTo(-122 * s, -82 * s);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(180 * s, -92 * s);
        ctx.quadraticCurveTo(282 * s, -178 * s, 318 * s, -34 * s);
        ctx.quadraticCurveTo(232 * s, -78 * s, 158 * s, -30 * s);
        ctx.lineTo(122 * s, -82 * s);
        ctx.closePath();
        ctx.fill();

        const helmet = ctx.createLinearGradient(0, -170 * s, 0, 120 * s);
        helmet.addColorStop(0, alpha(accent, 0.96));
        helmet.addColorStop(0.58, "#170b08");
        helmet.addColorStop(1, "#070707");
        ctx.fillStyle = helmet;
        ctx.beginPath();
        ctx.moveTo(-178 * s, -76 * s);
        ctx.quadraticCurveTo(-128 * s, -182 * s, 0, -194 * s);
        ctx.quadraticCurveTo(128 * s, -182 * s, 178 * s, -76 * s);
        ctx.lineTo(146 * s, 40 * s);
        ctx.quadraticCurveTo(0, 104 * s, -146 * s, 40 * s);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = alpha(gold, 0.82);
        ctx.lineWidth = 8 * s;
        ctx.beginPath();
        ctx.moveTo(-150 * s, -72 * s);
        ctx.quadraticCurveTo(0, -158 * s, 150 * s, -72 * s);
        ctx.stroke();

        ctx.fillStyle = "#080707";
        ctx.beginPath();
        ctx.moveTo(-128 * s, 12 * s);
        ctx.quadraticCurveTo(-94 * s, -38 * s, -38 * s, -28 * s);
        ctx.lineTo(-22 * s, 8 * s);
        ctx.quadraticCurveTo(-68 * s, 30 * s, -128 * s, 12 * s);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(128 * s, 12 * s);
        ctx.quadraticCurveTo(94 * s, -38 * s, 38 * s, -28 * s);
        ctx.lineTo(22 * s, 8 * s);
        ctx.quadraticCurveTo(68 * s, 30 * s, 128 * s, 12 * s);
        ctx.fill();

        ctx.fillStyle = alpha(gold, 0.86);
        ctx.beginPath();
        ctx.moveTo(-36 * s, 8 * s);
        ctx.lineTo(0, 70 * s);
        ctx.lineTo(36 * s, 8 * s);
        ctx.lineTo(16 * s, -60 * s);
        ctx.lineTo(-16 * s, -60 * s);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#0a0908";
        ctx.beginPath();
        ctx.moveTo(-118 * s, 46 * s);
        ctx.lineTo(118 * s, 46 * s);
        ctx.lineTo(88 * s, 150 * s);
        ctx.lineTo(-88 * s, 150 * s);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = alpha(accent, 0.78);
        ctx.lineWidth = 6 * s;
        for (let index = -2; index <= 2; index += 1) {
          ctx.beginPath();
          ctx.moveTo(index * 38 * s, 58 * s);
          ctx.lineTo(index * 24 * s, 138 * s);
          ctx.stroke();
        }

        ctx.fillStyle = alpha(gold, 0.92);
        ctx.beginPath();
        ctx.arc(0, -106 * s, 40 * s, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#080707";
        ctx.textAlign = "center";
        ctx.font = `900 ${style.prestige ? 30 * s : 24 * s}px Inter, Arial, sans-serif`;
        ctx.fillText(style.minValue >= 20 ? "20+" : style.minValue, 0, -96 * s);

        ctx.restore();
        ctx.textAlign = "left";
      }

      function drawSamuraiArt(ctx, style, x, y, width, height) {
        const cx = x + width * 0.57;
        const cy = y + height * 0.52;
        const level = Math.min(style.minValue / 20, 1);

        ctx.save();
        roundedRect(ctx, x, y, width, height, 30);
        ctx.clip();

        const bg = ctx.createLinearGradient(x, y, x + width, y + height);
        bg.addColorStop(0, style.deep);
        bg.addColorStop(0.48, style.mid);
        bg.addColorStop(1, "#050505");
        ctx.fillStyle = bg;
        ctx.fillRect(x, y, width, height);

        const sun = ctx.createRadialGradient(cx - 10, cy - 48, 40, cx - 10, cy - 48, 360);
        sun.addColorStop(0, alpha(style.accent2, 0.88));
        sun.addColorStop(0.46, alpha(style.accent, 0.24 + level * 0.28));
        sun.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = sun;
        ctx.fillRect(x, y, width, height);

        ctx.globalAlpha = 0.16 + level * 0.08;
        ctx.strokeStyle = "#fff8df";
        ctx.lineWidth = 2;
        for (let index = 0; index < 16; index += 1) {
          const yy = y + 70 + index * 42;
          ctx.beginPath();
          ctx.moveTo(x + 20, yy);
          ctx.bezierCurveTo(x + width * 0.34, yy - 34, x + width * 0.68, yy + 34, x + width - 12, yy - 10);
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
        const swordCount = style.minValue >= 18 ? 4 : style.minValue >= 10 ? 3 : 2;
        for (let index = 0; index < swordCount; index += 1) {
          const angle = (-0.58 + index * 0.38) * (index % 2 === 0 ? 1 : -1);
          drawKatana(ctx, cx - 44 + index * 28, cy + 10 - index * 22, angle, 670 - index * 42, style.accent, style.accent2);
        }

        ctx.save();
        ctx.globalAlpha = 0.2 + level * 0.24;
        ctx.strokeStyle = style.accent2;
        ctx.lineWidth = 18;
        ctx.beginPath();
        ctx.arc(cx, cy, 238, -0.3, Math.PI * 1.35);
        ctx.stroke();
        ctx.restore();

        drawSamuraiHelmet(ctx, cx, cy + 32, style.prestige ? 1.18 : 1.02, style);

        ctx.save();
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = alpha(style.accent2, 0.18);
        for (let index = 0; index < style.minValue; index += 1) {
          const row = Math.floor(index / 10);
          const col = index % 10;
          fillRoundedRect(ctx, x + 42 + col * 18, y + height - 74 + row * 22, 10, 22, 2, style.accent2);
        }
        ctx.restore();

        ctx.fillStyle = "rgba(255, 255, 255, 0.84)";
        ctx.font = "900 30px 'Space Mono', monospace";
        ctx.fillText("SAMURAI PRESTIGE", x + 42, y + 56);
        ctx.fillStyle = alpha(style.accent2, 0.82);
        ctx.font = "700 18px 'Space Mono', monospace";
        ctx.fillText(`${style.serial} // ${style.requirement.toUpperCase()}`, x + 42, y + 86);

        ctx.restore();
        strokeRoundedRect(ctx, x, y, width, height, 30, alpha(style.accent2, 0.5), 2);
      }

      function drawMoneyBill(ctx, x, y, width, height, angle, style, label = "$") {
        ctx.save();
        ctx.translate(x + width / 2, y + height / 2);
        ctx.rotate(angle);
        fillRoundedRect(ctx, -width / 2, -height / 2, width, height, 12, alpha(style.accent, 0.92));
        strokeRoundedRect(ctx, -width / 2 + 10, -height / 2 + 10, width - 20, height - 20, 8, alpha(style.accent2, 0.62), 3);
        ctx.fillStyle = "#06120a";
        ctx.textAlign = "center";
        ctx.font = `900 ${height * 0.48}px Inter, Arial, sans-serif`;
        ctx.fillText(label, 0, height * 0.17);
        ctx.restore();
        ctx.textAlign = "left";
      }

      function drawRedeployArt(ctx, style, x, y, width, height) {
        const cx = x + width * 0.56;
        const cy = y + height * 0.52;

        ctx.save();
        roundedRect(ctx, x, y, width, height, 30);
        ctx.clip();

        const bg = ctx.createLinearGradient(x, y, x + width, y + height);
        bg.addColorStop(0, style.deep);
        bg.addColorStop(0.48, style.mid);
        bg.addColorStop(1, "#050806");
        ctx.fillStyle = bg;
        ctx.fillRect(x, y, width, height);

        const glow = ctx.createRadialGradient(cx, cy, 40, cx, cy, 390);
        glow.addColorStop(0, alpha(style.accent, 0.7));
        glow.addColorStop(0.42, alpha(style.accent2, 0.22));
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(x, y, width, height);

        for (let index = 0; index < 13; index += 1) {
          const billX = x + 44 + (index * 97) % (width - 100);
          const billY = y + 60 + (index * 71) % (height - 130);
          drawMoneyBill(ctx, billX, billY, 90, 46, (index % 5 - 2) * 0.12, style, index % 3 === 0 ? "$" : "WZ");
        }

        ctx.save();
        ctx.globalAlpha = 0.92;
        ctx.strokeStyle = alpha(style.accent2, 0.94);
        ctx.lineWidth = 9;
        ctx.beginPath();
        ctx.moveTo(cx - 230, cy - 172);
        ctx.quadraticCurveTo(cx, cy - 322, cx + 230, cy - 172);
        ctx.quadraticCurveTo(cx + 124, cy - 226, cx, cy - 174);
        ctx.quadraticCurveTo(cx - 124, cy - 226, cx - 230, cy - 172);
        ctx.stroke();

        ctx.lineWidth = 4;
        ["-160", "-76", "0", "76", "160"].forEach((offset) => {
          ctx.beginPath();
          ctx.moveTo(cx + Number(offset), cy - 180);
          ctx.lineTo(cx, cy + 56);
          ctx.stroke();
        });
        ctx.restore();

        fillRoundedRect(ctx, cx - 176, cy + 8, 352, 216, 26, "rgba(2, 6, 4, 0.82)");
        strokeRoundedRect(ctx, cx - 176, cy + 8, 352, 216, 26, alpha(style.accent2, 0.72), 4);
        fillRoundedRect(ctx, cx - 132, cy + 48, 264, 70, 8, alpha(style.accent, 0.92));
        ctx.fillStyle = "#031006";
        ctx.textAlign = "center";
        ctx.font = "900 42px Inter, Arial, sans-serif";
        ctx.fillText("BUYBACK", cx, cy + 96);
        ctx.fillStyle = alpha(style.accent2, 0.92);
        ctx.font = "900 76px 'Teko', sans-serif";
        ctx.fillText(`+${match.redeploys}`, cx - 22, cy + 188);
        ctx.font = "700 20px 'Space Mono', monospace";
        ctx.fillText("REDEPLOYS", cx + 70, cy + 178);
        ctx.textAlign = "left";

        ctx.fillStyle = "rgba(255, 255, 255, 0.84)";
        ctx.font = "900 30px 'Space Mono', monospace";
        ctx.fillText("CASH FLEX CARD", x + 42, y + 56);
        ctx.fillStyle = alpha(style.accent2, 0.84);
        ctx.font = "700 18px 'Space Mono', monospace";
        ctx.fillText(`${style.serial} // ${style.requirement.toUpperCase()}`, x + 42, y + 86);

        ctx.restore();
        strokeRoundedRect(ctx, x, y, width, height, 30, alpha(style.accent2, 0.5), 2);
      }

      function drawRune(ctx, cx, cy, radius, style, index) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(index * 0.72);
        ctx.strokeStyle = index % 2 === 0 ? style.accent2 : style.accent;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, -radius);
        ctx.lineTo(radius * 0.36, -radius * 0.18);
        ctx.lineTo(radius, 0);
        ctx.lineTo(radius * 0.36, radius * 0.18);
        ctx.lineTo(0, radius);
        ctx.stroke();
        ctx.restore();
      }

      function drawReviveArt(ctx, style, x, y, width, height) {
        const cx = x + width * 0.58;
        const cy = y + height * 0.52;

        ctx.save();
        roundedRect(ctx, x, y, width, height, 30);
        ctx.clip();

        const bg = ctx.createLinearGradient(x, y, x + width, y + height);
        bg.addColorStop(0, style.deep);
        bg.addColorStop(0.5, style.mid);
        bg.addColorStop(1, "#050610");
        ctx.fillStyle = bg;
        ctx.fillRect(x, y, width, height);

        const glow = ctx.createRadialGradient(cx, cy, 30, cx, cy, 370);
        glow.addColorStop(0, alpha(style.accent2, 0.66));
        glow.addColorStop(0.42, alpha(style.accent, 0.28));
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(x, y, width, height);

        ctx.save();
        ctx.globalAlpha = 0.74;
        for (let index = 0; index < 10; index += 1) {
          drawRune(ctx, cx + Math.cos(index * 0.63) * 245, cy + Math.sin(index * 0.63) * 180, 28, style, index);
        }
        ctx.restore();

        ctx.strokeStyle = alpha(style.accent2, 0.74);
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.arc(cx, cy, 225, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = alpha(style.accent, 0.78);
        ctx.lineWidth = 18;
        ctx.beginPath();
        ctx.arc(cx, cy, 156, -0.2, Math.PI * 1.3);
        ctx.stroke();

        ctx.fillStyle = "rgba(4, 6, 16, 0.86)";
        ctx.beginPath();
        ctx.moveTo(cx - 106, cy + 146);
        ctx.quadraticCurveTo(cx - 124, cy + 58, cx - 78, cy + 8);
        ctx.lineTo(cx - 52, cy - 118);
        ctx.quadraticCurveTo(cx - 28, cy - 154, cx - 4, cy - 116);
        ctx.lineTo(cx + 2, cy - 34);
        ctx.lineTo(cx + 34, cy - 138);
        ctx.quadraticCurveTo(cx + 60, cy - 168, cx + 78, cy - 124);
        ctx.lineTo(cx + 62, cy - 18);
        ctx.lineTo(cx + 104, cy - 88);
        ctx.quadraticCurveTo(cx + 136, cy - 112, cx + 136, cy - 66);
        ctx.lineTo(cx + 76, cy + 78);
        ctx.quadraticCurveTo(cx + 42, cy + 156, cx - 106, cy + 146);
        ctx.fill();

        ctx.strokeStyle = alpha(style.accent2, 0.82);
        ctx.lineWidth = 5;
        ctx.stroke();

        fillRoundedRect(ctx, cx - 60, cy - 20, 120, 120, 20, alpha(style.accent, 0.9));
        ctx.fillStyle = "#070810";
        fillRoundedRect(ctx, cx - 16, cy + 0, 32, 78, 8, "#070810");
        fillRoundedRect(ctx, cx - 39, cy + 23, 78, 32, 8, "#070810");

        ctx.fillStyle = "rgba(255, 255, 255, 0.84)";
        ctx.font = "900 30px 'Space Mono', monospace";
        ctx.fillText("SAVE THE RUN", x + 42, y + 56);
        ctx.fillStyle = alpha(style.accent2, 0.84);
        ctx.font = "700 18px 'Space Mono', monospace";
        ctx.fillText(`${style.serial} // ${style.requirement.toUpperCase()}`, x + 42, y + 86);

        ctx.restore();
        strokeRoundedRect(ctx, x, y, width, height, 30, alpha(style.accent2, 0.5), 2);
      }

      function drawCardBase(ctx, style, stats, width, height) {
        const base = ctx.createLinearGradient(0, 0, width, height);
        base.addColorStop(0, "#040404");
        base.addColorStop(0.45, style.deep);
        base.addColorStop(0.72, "#090909");
        base.addColorStop(1, style.mid);
        ctx.fillStyle = base;
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(width * 0.8, height * 0.24, 40, width * 0.78, height * 0.24, 560);
        glow.addColorStop(0, alpha(style.accent, 0.42));
        glow.addColorStop(0.52, alpha(style.accent2, 0.12));
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalAlpha = 0.14;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        for (let x = -360; x < width + 320; x += 70) {
          ctx.beginPath();
          ctx.moveTo(x, -60);
          ctx.lineTo(x + 410, height + 60);
          ctx.stroke();
        }
        ctx.restore();

        drawGrain(ctx, width, height, activeStyle * 311 + stats[style.metric] * 17, 0.085);

        strokeRoundedRect(ctx, 26, 26, width - 52, height - 52, 34, alpha(style.accent2, 0.48), 3);
        strokeRoundedRect(ctx, 42, 42, width - 84, height - 84, 25, "rgba(255, 255, 255, 0.18)", 1.5);
      }

      function drawTopMeta(ctx, style, stats, width) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.82)";
        ctx.font = "900 25px 'Space Mono', monospace";
        ctx.fillText("LAST DROP: RECALL", 64, 78);
        ctx.fillStyle = alpha(style.accent2, 0.9);
        ctx.font = "700 17px 'Space Mono', monospace";
        ctx.fillText("WARZONE REACTIVATION CARD", 64, 106);
        ctx.fillStyle = "rgba(255, 255, 255, 0.58)";
        ctx.textAlign = "right";
        ctx.font = "700 17px 'Space Mono', monospace";
        ctx.fillText(`${stats.map.toUpperCase()} // ${style.serial}`, width - 64, 84);
        ctx.textAlign = "left";
        drawBarcode(ctx, width - 255, 101, 190, 34, "rgba(255, 255, 255, 0.42)");
      }

      function drawPlayerBlock(ctx, style, stats) {
        ctx.fillStyle = "#fffaf0";
        drawFittedText(ctx, stats.player.toUpperCase(), 64, 172, 410, 58, 30, "Inter, Arial, sans-serif", 900);

        fillRoundedRect(ctx, 64, 194, 172, 38, 19, alpha(style.accent, 0.94));
        ctx.fillStyle = "#070707";
        ctx.font = "900 19px 'Space Mono', monospace";
        ctx.fillText(style.requirement.toUpperCase(), 84, 220);

        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        drawFittedText(ctx, stats.moment.toUpperCase(), 64, 262, 390, 17, 12, "'Space Mono', monospace", 700);
      }

      function drawPrimaryStat(ctx, style, stats) {
        const primary = getPrimaryStat(style, stats);
        ctx.fillStyle = alpha(style.accent2, 0.92);
        ctx.font = "900 184px Inter, Arial, sans-serif";
        ctx.fillText(primary.value, 54, 458);
        ctx.fillStyle = "#fffaf0";
        drawFittedText(ctx, primary.label.toUpperCase(), 66, 548, 448, 88, 56, "Inter, Arial, sans-serif", 900);

        ctx.fillStyle = alpha(style.accent, 0.96);
        drawFittedText(ctx, style.title.toUpperCase(), 66, 614, 470, 56, 34, "'Teko', sans-serif", 900);
        ctx.fillStyle = "rgba(255, 255, 255, 0.62)";
        ctx.font = "700 20px 'Space Mono', monospace";
        ctx.fillText(style.subtitle.toUpperCase(), 68, 648);
      }

      function drawStatTicker(ctx, style, stats, width, height) {
        const statRows = [
          ["FINISH", stats.finish],
          ["DAMAGE", stats.damage],
          ["KILLS", stats.kills],
          ["REDEPLOYS", stats.redeploys],
          ["REVIVES", stats.revives],
        ];
        const activeLabel =
          style.metric === "redeploys" ? "REDEPLOYS" : style.metric === "revives" ? "REVIVES" : "KILLS";
        const x = 58;
        const y = height - 142;
        const tickerWidth = width - 116;
        const cellWidth = tickerWidth / stats.length;

        fillRoundedRect(ctx, x, y, tickerWidth, 82, 16, "rgba(0, 0, 0, 0.48)");
        strokeRoundedRect(ctx, x, y, tickerWidth, 82, 16, "rgba(255, 255, 255, 0.16)", 1.5);

        statRows.forEach(([label, value], index) => {
          const cellX = x + index * cellWidth;
          if (index > 0) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
            ctx.fillRect(cellX, y + 14, 1, 54);
          }

          ctx.fillStyle = "rgba(255, 255, 255, 0.56)";
          ctx.font = "700 16px 'Space Mono', monospace";
          ctx.fillText(label, cellX + 22, y + 31);
          ctx.fillStyle = label === activeLabel ? style.accent2 : "#fffaf0";
          ctx.font = "900 34px 'Teko', sans-serif";
          ctx.fillText(String(value).toUpperCase(), cellX + 22, y + 66);
        });
      }

      function drawFooter(ctx, style, width, height) {
        drawMiniQr(ctx, width - 164, height - 174, 96, "#080808");
        ctx.fillStyle = "rgba(255, 255, 255, 0.52)";
        ctx.font = "700 14px 'Space Mono', monospace";
        ctx.fillText("COPY CARD // TEXT SQUAD", 64, height - 31);
        ctx.textAlign = "right";
        ctx.fillText("RUN IT BACK", width - 64, height - 31);
        ctx.textAlign = "left";
      }

      function drawLockOverlay(ctx, style, width, height) {
        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.68)";
        ctx.fillRect(0, 0, width, height);
        ctx.translate(width / 2, height / 2);
        ctx.rotate(-0.08);
        strokeRoundedRect(ctx, -320, -96, 640, 192, 26, style.accent, 8);
        ctx.fillStyle = "#fffaf0";
        ctx.textAlign = "center";
        ctx.font = "900 72px Inter, Arial, sans-serif";
        ctx.fillText(style.requirement.toUpperCase(), 0, -8);
        ctx.fillStyle = alpha(style.accent2, 0.94);
        ctx.font = "700 27px 'Space Mono', monospace";
        ctx.fillText("LOCKED CARD STYLE", 0, 50);
        ctx.restore();
        ctx.textAlign = "left";
      }

      function renderShareCard() {
        const style = cardStyles[activeStyle];
        const stats = getStyleStats(style);
        const ctx = shareCardContext;
        const width = shareCardCanvas.width;
        const height = shareCardCanvas.height;
        const unlocked = isStyleUnlocked(style);

        ctx.clearRect(0, 0, width, height);
        drawCardBase(ctx, style, stats, width, height);

        const artX = 502;
        const artY = 132;
        const artWidth = 826;
        const artHeight = 582;

        drawGeneratedArt(ctx, style, artX, artY, artWidth, artHeight);

        drawTopMeta(ctx, style, stats, width);
        drawPlayerBlock(ctx, style, stats);
        drawPrimaryStat(ctx, style, stats);
        drawStatTicker(ctx, style, stats, width, height);
        drawFooter(ctx, style, width, height);

        if (!unlocked) {
          drawLockOverlay(ctx, style, width, height);
        }
      }

      function setStyle(index) {
        activeStyle = (index + cardStyles.length) % cardStyles.length;
        const style = cardStyles[activeStyle];
        const stats = getStyleStats(style);
        styleSelect.value = String(activeStyle);
        recallCard.style.setProperty("--accent", style.accent);
        recallCard.style.setProperty("--paper-tint", style.paper);
        smsLink.href = getSmsHref(style, stats);
        renderShareCard();
      }

      setStyle(activeStyle);
      if (document.fonts) {
        document.fonts.ready.then(renderShareCard);
      }

      previousStyle.addEventListener("click", () => setStyle(activeStyle - 1));
      nextStyle.addEventListener("click", () => setStyle(activeStyle + 1));
      styleSelect.addEventListener("change", (event) => setStyle(Number(event.target.value)));

      function canvasToBlob(canvas) {
        return new Promise((resolve, reject) => {
          canvas.toBlob((blob) => {
            if (blob) {
              resolve(blob);
            } else {
              reject(new Error("Unable to render card image"));
            }
          }, "image/png", 0.96);
        });
      }

      async function copyCardImage() {
        const style = getActiveStyle();
        const stats = getStyleStats(style);
        const blob = await canvasToBlob(shareCardCanvas);

        if (navigator.clipboard && window.ClipboardItem && window.isSecureContext) {
          try {
            await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
            return "copied";
          } catch {}
        }

        const downloadUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = downloadUrl;
        link.download = getCardFilename(style, stats);
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(downloadUrl);
        return "downloaded";
      }

      async function inviteSquadWithCard() {
        const style = getActiveStyle();
        const stats = getStyleStats(style);
        const blob = await canvasToBlob(shareCardCanvas);
        const file = new File([blob], getCardFilename(style, stats), {
          type: "image/png",
        });
        const shareData = {
          title: "Last Drop: Recall",
          text: getRecallText(style, stats),
          url: shareUrl,
        };

        if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
          await navigator.share({
            ...shareData,
            files: [file],
          });
          return "image";
        }

        if (navigator.share) {
          await navigator.share(shareData);
          return "link";
        }

        window.location.href = getSmsHref(style, stats);
        return "sms";
      }

      copyImageButton.addEventListener("click", async () => {
        const idleLabel = "Copy Card Image";

        try {
          const result = await copyCardImage();
          copyImageButton.textContent = result === "copied" ? "Image Copied" : "Image Downloaded";
        } catch {
          copyImageButton.textContent = "Copy Failed";
        }

        window.setTimeout(() => {
          copyImageButton.textContent = idleLabel;
        }, 1800);
      });

      smsLink.addEventListener("click", async (event) => {
        const idleLabel = "Invite Squad / SMS";
        event.preventDefault();
        smsLink.textContent = "Preparing Card";

        try {
          const result = await inviteSquadWithCard();
          smsLink.textContent = result === "image" ? "Card Attached" : "Invite Opened";
        } catch (error) {
          if (error.name === "AbortError") {
            smsLink.textContent = idleLabel;
            return;
          }

          window.location.href = getSmsHref();
          smsLink.textContent = "SMS Opened";
        }

        window.setTimeout(() => {
          smsLink.textContent = idleLabel;
        }, 1800);
      });
    </script>
  </body>
